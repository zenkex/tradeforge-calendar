<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>P&L Calendar</title>

  <!-- Preconnect for faster font delivery -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Space Grotesk (English) + Noto Sans SC (Chinese) from Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Space Grotesk', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'Noto Sans SC', 'sans-serif'],
          },
          colors: {
            profit: '#A2E736',
            loss: '#F543A5',
            zinc: {
              50:  '#ffffff',
              100: '#ffffff',
              200: '#e8e8e8',
              300: '#d0d0d0',
              400: '#a0a0a0',
              500: '#888888',
              600: '#666666',
              700: '#2a2a2a',
              800: '#1a1a1a',
              900: '#141414',
              950: '#000000',
            },
          },
        }
      }
    }
  </script>
  <style>
    * { box-sizing: border-box; }
    html { -webkit-tap-highlight-color: transparent; }

    /* Hide number input spinners */
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none; margin: 0;
    }
    input[type="number"] { -moz-appearance: textfield; }

    /* Modal backdrop animation */
    .modal-enter { animation: fadeIn 0.2s ease-out; }
    .modal-card  { animation: scaleIn 0.2s ease-out; }
    @keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.95) translateY(8px); }
                          to   { opacity: 1; transform: scale(1) translateY(0); } }

    /* Toast animation */
    .toast-enter { animation: slideUp 0.3s ease-out; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(16px); }
                          to   { opacity: 1; transform: translateY(0); } }

    /* Calendar cell transitions */
    .cal-cell { transition: all 0.15s ease; }
    .cal-cell:active { transform: scale(0.97); }

    /* Weekend cells */
    .weekend-cell { cursor: default; }

    /* Pulse ring for today */
    .today-ring { box-shadow: 0 0 0 2px rgba(255,255,255,0.25), 0 0 0 6px rgba(255,255,255,0.06); }

    /* ---- Theme: CSS custom properties ---- */
    :root {
      --bg-primary: #000000;
      --bg-card: #141414;
      --bg-card-hover: #222222;
      --bg-element: #1a1a1a;
      --bg-element-hover: #2a2a2a;
      --text-primary: #ffffff;
      --text-secondary: #a0a0a0;
      --text-muted: #888888;
      --border: rgba(42,42,42,0.6);
      --border-light: rgba(42,42,42,0.35);
      --ring-glow: rgba(255,255,255,0.15);
      --shadow: rgba(0,0,0,0.4);
      --overlay: rgba(0,0,0,0.8);
      --weekend-bg: rgba(20,20,20,0.5);
    }

    /* ---- Theme: light overrides ---- */
    .light-theme body,
    .light-theme { background-color: #f1f5f9 !important; color: #1e293b !important; }

    .light-theme .bg-zinc-950 { background-color: #f1f5f9 !important; }
    .light-theme .bg-zinc-900,
    .light-theme .bg-zinc-900\/80 { background-color: #ffffff !important; }
    .light-theme .bg-zinc-900\/30 { background-color: #f1f5f9 !important; }
    .light-theme .bg-zinc-800,
    .light-theme .bg-zinc-800\/50,
    .light-theme .bg-zinc-800\/40,
    .light-theme .bg-zinc-800\/30,
    .light-theme .bg-zinc-800\/20,
    .light-theme .bg-zinc-800\/15,
    .light-theme .bg-zinc-800\/10,
    .light-theme .bg-zinc-800\/95 { background-color: #f8fafc !important; }
    .light-theme .bg-zinc-700,
    .light-theme .bg-zinc-700\/50,
    .light-theme .bg-zinc-700\/40 { background-color: #e2e8f0 !important; }
    .light-theme .bg-zinc-100 { background-color: #1e293b !important; }
    .light-theme .bg-profit\/10 { background-color: rgba(162,231,54,0.12) !important; }
    .light-theme .bg-loss\/10 { background-color: rgba(245,67,165,0.12) !important; }
    .light-theme .bg-profit\/5 { background-color: rgba(162,231,54,0.06) !important; }
    .light-theme .bg-loss\/5 { background-color: rgba(245,67,165,0.06) !important; }
    .light-theme .bg-black\/70 { background-color: rgba(0,0,0,0.5) !important; }

    .light-theme .text-zinc-50 { color: #0f172a !important; }
    .light-theme .text-zinc-100 { color: #1e293b !important; }
    .light-theme .text-zinc-200 { color: #334155 !important; }
    .light-theme .text-zinc-300 { color: #475569 !important; }
    .light-theme .text-zinc-400 { color: #64748b !important; }
    .light-theme .text-zinc-500 { color: #94a3b8 !important; }
    .light-theme .text-zinc-600 { color: #94a3b8 !important; }
    .light-theme .text-zinc-900 { color: #f8fafc !important; }
    .light-theme .text-profit { color: #5D9B0E !important; }
    .light-theme .text-profit\/80 { color: rgba(93,155,14,0.8) !important; }
    .light-theme .text-loss { color: #C41E7B !important; }
    .light-theme .text-loss\/80 { color: rgba(196,30,123,0.8) !important; }

    .light-theme .border-zinc-800\/50 { border-color: #e2e8f0 !important; }
    .light-theme .border-zinc-800\/30 { border-color: #e2e8f0 !important; }
    .light-theme .border-zinc-700\/50 { border-color: #cbd5e1 !important; }
    .light-theme .border-[#555]\/50 { border-color: #94a3b8 !important; }
    .light-theme .border-profit\/20 { border-color: rgba(162,231,54,0.3) !important; }
    .light-theme .border-profit\/15 { border-color: rgba(162,231,54,0.25) !important; }
    .light-theme .border-loss\/20 { border-color: rgba(245,67,165,0.3) !important; }
    .light-theme .border-loss\/15 { border-color: rgba(245,67,165,0.25) !important; }

    .light-theme .hover\:bg-zinc-800:hover { background-color: #e2e8f0 !important; }
    .light-theme .hover\:bg-zinc-700:hover { background-color: #cbd5e1 !important; }
    .light-theme .hover\:bg-zinc-700\/40:hover { background-color: #cbd5e1 !important; }
    .light-theme .hover\:bg-zinc-700\/50:hover { background-color: #cbd5e1 !important; }
    .light-theme .hover\:bg-loss\/10:hover { background-color: rgba(245,67,165,0.15) !important; }
    .light-theme .hover\:text-zinc-200:hover { color: #334155 !important; }
    .light-theme .hover\:text-zinc-300:hover { color: #475569 !important; }
    .light-theme .hover\:bg-profit\/20:hover { background-color: rgba(162,231,54,0.2) !important; }
    .light-theme .hover\:bg-loss\/20:hover { background-color: rgba(245,67,165,0.2) !important; }
    .light-theme .hover\:bg-white:hover { background-color: #f1f5f9 !important; }

    .light-theme .shadow-black\/20 { --tw-shadow-color: rgba(0,0,0,0.05) !important; }
    .light-theme .shadow-xl { --tw-shadow: 0 4px 12px rgba(0,0,0,0.06) !important; }
    .light-theme .shadow-2xl { --tw-shadow: 0 8px 30px rgba(0,0,0,0.08) !important; }

    .light-theme .placeholder-zinc-600::placeholder { color: #94a3b8 !important; }
    .light-theme .focus\:border-zinc-500:focus { border-color: #64748b !important; }
    .light-theme .ring-zinc-500 { --tw-ring-color: #64748b !important; }
    .light-theme .focus\:ring-zinc-500:focus { --tw-ring-color: #64748b !important; }

    .light-theme .weekend-cell { background-color: #f1f5f9 !important; color: #94a3b8 !important; }
    .light-theme .today-ring { box-shadow: 0 0 0 2px rgba(0,0,0,0.2), 0 0 0 6px rgba(0,0,0,0.06) !important; }

    .light-theme #chartTooltip { background-color: rgba(255,255,255,0.95) !important; color: #1e293b !important; border-color: #cbd5e1 !important; }
    .light-theme #statTooltip { background-color: #ffffff !important; color: #1e293b !important; border-color: #cbd5e1 !important; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen font-sans antialiased">

  <!-- ===== Toast Container ===== -->
  <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[100] pointer-events-none"></div>

  <!-- ===== Stat Tooltip ===== -->
  <div id="statTooltip" class="fixed z-[101] hidden opacity-0 transition-opacity duration-150 bg-zinc-800 text-zinc-200 text-xs rounded-lg shadow-xl border border-[#555]/50 px-3 py-2 max-w-[240px] leading-relaxed pointer-events-none"></div>

  <!-- ===== Main Container ===== -->
  <div class="max-w-5xl mx-auto px-4 py-6 sm:px-6 lg:px-8">

    <!-- Header -->
    <header class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
      <div class="flex items-center gap-3 sm:gap-4 flex-wrap">
        <h1 class="text-2xl sm:text-3xl font-bold tracking-tight text-zinc-50">P&L Calendar</h1>
        <div class="flex items-center gap-2 px-3 py-2 rounded-xl bg-zinc-900/80 border border-zinc-800/50">
          <span class="text-xs text-zinc-500">当前资金</span>
          <span id="currentBalance" class="text-xs font-sans font-semibold text-zinc-300">$0.00</span>
          <button onclick="openBalanceModal()" title="设置初始资金"
            class="ml-1 text-zinc-500 hover:text-zinc-300 transition-colors text-sm leading-none">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          </button>
        </div>
      </div>
      <div class="flex flex-wrap items-center gap-2 sm:gap-3">
        <div class="relative">
          <button id="accountBtn" onclick="toggleAccountMenu()"
            class="flex items-center justify-between gap-2 px-3 py-1.5 text-xs sm:text-sm rounded-lg bg-zinc-800 hover:bg-zinc-700 text-zinc-200 border border-zinc-700/50 transition-colors w-64">
            <span id="accountBtnLabel" class="truncate">默认账户</span>
            <svg class="w-3.5 h-3.5 text-zinc-500 transition-transform flex-shrink-0" id="accountArrow" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 9l6 6 6-6"/></svg>
          </button>
          <div id="accountMenu" class="absolute top-full left-0 mt-1 w-full bg-zinc-800 rounded-xl shadow-2xl border border-zinc-700/50 py-1 z-40 hidden overflow-hidden"
               onclick="event.stopPropagation()">
            <div id="accountMenuItems"></div>
            <div class="border-t border-zinc-700/50 mt-1 pt-1">
              <button onclick="closeAccountMenu(); openNewAccountModal()"
                class="w-full text-left px-3.5 py-2 text-xs text-zinc-400 hover:bg-zinc-700 hover:text-zinc-200 transition-colors flex items-center gap-2">
                <span class="text-base leading-none">＋</span> 新建账户
              </button>
            </div>
          </div>
        </div>
        <button onclick="exportData()" title="导出 JSON 备份"
          class="px-3 py-1.5 text-xs sm:text-sm rounded-lg bg-zinc-800 hover:bg-zinc-700 text-zinc-300 transition-colors border border-zinc-700/50">
          <span class="hidden sm:inline">导出</span> JSON
        </button>
        <label title="导入 JSON 备份"
          class="px-3 py-1.5 text-xs sm:text-sm rounded-lg bg-zinc-800 hover:bg-zinc-700 text-zinc-300 transition-colors border border-zinc-700/50 cursor-pointer">
          <span class="hidden sm:inline">导入</span> JSON
          <input type="file" accept=".json" onchange="importData(event)" class="hidden">
        </label>
        <button id="themeToggle" onclick="toggleTheme()" title="切换主题"
          class="px-3 py-1.5 text-sm rounded-lg bg-zinc-800 hover:bg-zinc-700 text-zinc-300 transition-colors border border-zinc-700/50">
          <span id="themeIcon">🌙</span>
        </button>
      </div>
    </header>

    <!-- Stats Cards -->
    <div class="grid grid-cols-3 gap-3 sm:gap-4 mb-6" id="statsCards"></div>

    <!-- Month Navigation -->
    <div class="flex items-center justify-between mb-4">
      <button onclick="goToPrevMonth()"
        class="p-2 rounded-lg hover:bg-zinc-800 transition-colors text-zinc-400 hover:text-zinc-200"
        aria-label="上个月">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      </button>
      <h2 id="monthLabel" class="text-lg sm:text-xl font-semibold text-zinc-100"></h2>
      <div class="flex items-center gap-2">
        <button onclick="goToToday()"
          class="px-3 py-1.5 text-xs sm:text-sm rounded-lg bg-zinc-800 hover:bg-zinc-700 text-zinc-400 hover:text-zinc-200 transition-colors border border-zinc-700/50">
          今天
        </button>
        <button onclick="goToNextMonth()"
          class="p-2 rounded-lg hover:bg-zinc-800 transition-colors text-zinc-400 hover:text-zinc-200"
          aria-label="下个月">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
        </button>
      </div>
      <button onclick="clearCurrentMonth()"
        class="px-3 py-1.5 text-xs sm:text-sm rounded-lg bg-loss/10 hover:bg-loss/20 text-loss border-2 border-loss/20 transition-colors">
        清空本月数据
      </button>
    </div>

    <!-- Calendar -->
    <div class="bg-zinc-900/80 rounded-xl p-3 sm:p-5 shadow-xl shadow-black/50 border border-zinc-800/50 mb-6">
      <!-- Day-of-week headers -->
      <div class="grid grid-cols-8 mb-2 text-center text-xs sm:text-sm font-medium text-zinc-500">
        <span class="text-zinc-600">日</span>
        <span>一</span><span>二</span><span>三</span><span>四</span><span>五</span>
        <span class="text-zinc-600">六</span>
        <span class="text-zinc-500">每周盈亏</span>
      </div>
      <!-- Day cells + weekly P&L -->
      <div id="calendarGrid" class="grid grid-cols-8 gap-1.5 sm:gap-2"></div>
    </div>

    <!-- Advanced Stats -->
    <div class="bg-zinc-900/80 rounded-xl p-4 sm:p-5 shadow-xl shadow-black/50 border border-zinc-800/50 mb-6">
      <h3 class="text-sm font-semibold text-zinc-500 uppercase tracking-wide mb-3">高级统计</h3>
      <div id="advancedStats" class="grid grid-cols-2 sm:grid-cols-4 gap-3"></div>
    </div>

    <!-- Chart -->
    <div class="bg-zinc-900/80 rounded-xl p-4 sm:p-5 shadow-xl shadow-black/50 border border-zinc-800/50">
      <h3 class="text-sm font-semibold text-zinc-500 uppercase tracking-wide mb-3">本月资金曲线（累计盈亏）</h3>
      <div class="relative w-full" style="height:240px">
        <canvas id="pnlChart"></canvas>
        <div id="chartTooltip" class="absolute pointer-events-none hidden bg-zinc-800/95 text-zinc-100 text-xs font-sans px-2.5 py-1.5 rounded-lg border border-[#555]/50 shadow-xl whitespace-nowrap z-10" style="transform:translate(-50%,-110%)"></div>
      </div>
    </div>

  </div>

  <!-- ===== Modal ===== -->
  <div id="modal" class="fixed inset-0 z-50 hidden items-center justify-center p-4" onclick="closeModal()">
    <div class="absolute inset-0 bg-black/80 modal-enter"></div>
    <div class="modal-card relative bg-zinc-900 rounded-xl shadow-2xl border border-zinc-700/50 w-full max-w-sm p-5 sm:p-6"
         onclick="event.stopPropagation()">
      <!-- Close button -->
      <button onclick="closeModal()" class="absolute top-4 right-4 text-zinc-500 hover:text-zinc-300 transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>

      <h3 id="modalDate" class="text-lg font-semibold text-zinc-100 mb-5"></h3>

      <div class="space-y-4">
        <div>
          <label class="block text-xs font-medium text-zinc-500 mb-1.5 uppercase tracking-wide">盈亏金额</label>
          <div class="relative">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-500 text-lg font-sans">$</span>
            <input id="modalPnl" type="text" inputmode="decimal" placeholder="0.00"
              oninput="filterPnlInput(this)"
              class="w-full pl-9 pr-4 py-3 bg-zinc-800 rounded-xl border border-zinc-700/50 text-zinc-100 text-xl font-sans font-medium placeholder-zinc-600 focus:outline-none focus:border-zinc-500 focus:ring-1 focus:ring-zinc-500 transition-all">
          </div>
        </div>
        <div>
          <label class="block text-xs font-medium text-zinc-500 mb-1.5 uppercase tracking-wide">备注（可选）</label>
          <input id="modalNote" type="text" placeholder="交易备注..."
            class="w-full px-4 py-2.5 bg-zinc-800 rounded-xl border border-zinc-700/50 text-zinc-200 text-sm placeholder-zinc-600 focus:outline-none focus:border-zinc-500 focus:ring-1 focus:ring-zinc-500 transition-all">
        </div>
      </div>

      <div class="flex items-center justify-between mt-6 gap-3">
        <button id="modalDelete" onclick="deleteModalEntry()"
          class="px-4 py-2.5 text-sm font-medium text-loss hover:text-loss/80 hover:bg-loss/10 rounded-xl transition-colors">
          删除
        </button>
        <div class="flex gap-2 ml-auto">
          <button onclick="closeModal()"
            class="px-5 py-2.5 text-sm font-medium text-zinc-400 hover:text-zinc-200 hover:bg-zinc-800 rounded-xl transition-colors">
            取消
          </button>
          <button onclick="saveModalEntry()"
            class="px-5 py-2.5 text-sm font-semibold bg-zinc-100 text-zinc-900 hover:bg-white rounded-xl transition-colors">
            保存
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== Confirm Clear Modal ===== -->
  <div id="confirmClearModal" class="fixed inset-0 z-50 hidden items-center justify-center p-4" onclick="closeConfirmClear()">
    <div class="absolute inset-0 bg-black/80 modal-enter"></div>
    <div class="modal-card relative bg-zinc-900 rounded-xl shadow-2xl border border-zinc-700/50 w-full max-w-sm p-5 sm:p-6"
         onclick="event.stopPropagation()">
      <button onclick="closeConfirmClear()" class="absolute top-4 right-4 text-zinc-500 hover:text-zinc-300 transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
      <h3 class="text-lg font-semibold text-zinc-100 mb-3">确认清空</h3>
      <p id="confirmClearMsg" class="text-sm text-zinc-400 leading-relaxed mb-6"></p>
      <div class="flex justify-end gap-3">
        <button onclick="closeConfirmClear()"
          class="px-5 py-2.5 text-sm font-medium text-zinc-400 hover:text-zinc-200 hover:bg-zinc-800 rounded-xl transition-colors">
          取消
        </button>
        <button onclick="doClearMonth()"
          class="px-5 py-2.5 text-sm font-semibold bg-loss text-white hover:bg-[#D63A8F] rounded-xl transition-colors">
          确认清空
        </button>
      </div>
    </div>
  </div>

  <!-- ===== New Account Modal ===== -->
  <div id="newAccountModal" class="fixed inset-0 z-50 hidden items-center justify-center p-4" onclick="closeNewAccountModal()">
    <div class="absolute inset-0 bg-black/80 modal-enter"></div>
    <div class="modal-card relative bg-zinc-900 rounded-xl shadow-2xl border border-zinc-700/50 w-full max-w-sm p-5 sm:p-6"
         onclick="event.stopPropagation()">
      <button onclick="closeNewAccountModal()" class="absolute top-4 right-4 text-zinc-500 hover:text-zinc-300 transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
      <h3 class="text-lg font-semibold text-zinc-100 mb-4">新建账户</h3>
      <input id="newAccountName" type="text" placeholder="输入账户名..."
        class="w-full px-4 py-2.5 bg-zinc-800 rounded-xl border border-zinc-700/50 text-zinc-200 text-sm placeholder-zinc-600 focus:outline-none focus:border-zinc-500 focus:ring-1 focus:ring-zinc-500 transition-all mb-5"
        onkeydown="if(event.key==='Enter') confirmNewAccount()">
      <div class="flex justify-end gap-3">
        <button onclick="closeNewAccountModal()"
          class="px-5 py-2.5 text-sm font-medium text-zinc-400 hover:text-zinc-200 hover:bg-zinc-800 rounded-xl transition-colors">取消</button>
        <button onclick="confirmNewAccount()"
          class="px-5 py-2.5 text-sm font-semibold bg-zinc-100 text-zinc-900 hover:bg-white rounded-xl transition-colors">创建</button>
      </div>
    </div>
  </div>

  <!-- ===== Delete Account Modal ===== -->
  <div id="deleteAccountModal" class="fixed inset-0 z-50 hidden items-center justify-center p-4" onclick="closeDeleteAccountModal()">
    <div class="absolute inset-0 bg-black/80 modal-enter"></div>

              oninput="filterPnlInput(this); updateBalancePreview()"

              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 11V7a4 4 0 018 0m-4 8v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z"/>
              </svg>
            </button>

        <div class="bg-zinc-800/50 rounded-xl p-3 flex items-center justify-between">
          <span class="text-xs text-zinc-500">当前资金</span>

  <script>
  // ============================================================
  //  P&L Calendar - 本地交易盈亏日历
  // ============================================================

  const CALENDARS_KEY = 'pnlCalendars';
  const LAST_ACCOUNT_KEY = 'pnlLastAccount';
  const MONTH_NAMES = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const DAY_NAMES = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
  const INITIAL_BALANCE_KEY = '_initialBalance';
  const BALANCE_LOCKED_KEY = '_initialBalanceLocked';

  // ---- State ----
  const now = new Date();
  let currentYear  = now.getFullYear();
  let currentMonth = now.getMonth(); // 0-indexed
  let currentAccount = null;
  let allAccounts = {};
  let pnlData = {};

  // ---- Utilities ----
  function fmtDate(y, m, d) {
    return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  }

  function parseDate(str) {
    const [y, m, d] = str.split('-').map(Number);
    return { y, m: m-1, d };
  }

  function fmtPnL(value, compact) {
    const abs = Math.abs(value);
    if (compact) {
      if (abs >= 1e6) return (value >= 0 ? '$' : '-$') + (abs/1e6).toFixed(2) + 'M';
      if (abs >= 1e3) return (value >= 0 ? '$' : '-$') + (abs/1e3).toFixed(2) + 'k';
      return (value >= 0 ? '$' : '-$') + abs.toFixed(2);
    }
    const s = abs.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    return (value >= 0 ? '$' : '-$') + s;
  }

  function getDaysInMonth(y, m) {
    return new Date(y, m+1, 0).getDate();
  }

  function getFirstDayOffset(y, m) {
    return new Date(y, m, 1).getDay(); // 0=Sun, week starts Sunday
  }

  function isWeekend(y, m, d) {
    const dow = new Date(y, m, d).getDay();
    return dow === 0 || dow === 6;
  }

  function isCurrentDay(y, m, d) {
    return y === now.getFullYear() && m === now.getMonth() && d === now.getDate();
  }

  // ---- Data ----
  function loadData() {
    try { allAccounts = JSON.parse(localStorage.getItem(CALENDARS_KEY)) || {}; }
    catch { allAccounts = {}; }
    const names = Object.keys(allAccounts);

    // First ever use: try migrating old single-account data, else create default
    if (names.length === 0) {
      const old = localStorage.getItem('pnlCalendar');
      if (old) {
        try { allAccounts['默认账户'] = JSON.parse(old); localStorage.removeItem('pnlCalendar'); }
        catch { allAccounts['默认账户'] = {}; }
      } else {
        allAccounts['默认账户'] = {};
      }
      // Re-read names after migration/creation
    }

    // Restore last active account, or pick the first one
    const saved = localStorage.getItem(LAST_ACCOUNT_KEY);
    const updatedNames = Object.keys(allAccounts);
    if (saved && allAccounts[saved]) {
      currentAccount = saved;
    } else {
      currentAccount = updatedNames[0] || '默认账户';
    }
    pnlData = allAccounts[currentAccount];
  }

  function saveData() {
    allAccounts[currentAccount] = pnlData;
    localStorage.setItem(CALENDARS_KEY, JSON.stringify(allAccounts));
    localStorage.setItem(LAST_ACCOUNT_KEY, currentAccount);
  }

  function switchAccount(name) {
    allAccounts[currentAccount] = pnlData;
    currentAccount = name;
    if (!allAccounts[name]) allAccounts[name] = {};
    pnlData = allAccounts[name];
    localStorage.setItem(LAST_ACCOUNT_KEY, currentAccount);
    refreshAccountBtn();
    renderAll();
  }

  function getEntry(dateStr) {
    return pnlData[dateStr] || null;
  }

  function setEntry(dateStr, pnl, note) {
    pnlData[dateStr] = { pnl: Math.round(pnl * 100) / 100, note: (note || '').trim() };
    saveData();
  }

  function deleteEntry(dateStr) {
    delete pnlData[dateStr];
    saveData();
  }

  function getInitialBalance() {
    return pnlData[INITIAL_BALANCE_KEY] || 0;
  }

  function setInitialBalance(value) {
    pnlData[INITIAL_BALANCE_KEY] = Math.round(value * 100) / 100;
    saveData();
  }

  function isBalanceLocked() {
    return pnlData[BALANCE_LOCKED_KEY] === true;
  }

  function setBalanceLocked(locked) {
    pnlData[BALANCE_LOCKED_KEY] = locked;
    saveData();
  }

  function getCurrentBalance() {
    const allPnL = sumPnL(Object.entries(pnlData)
      .filter(([k]) => k !== INITIAL_BALANCE_KEY && k !== BALANCE_LOCKED_KEY)
      .map(([, v]) => v));
    return getInitialBalance() + allPnL;
  }

  // ---- Balance ----
  const LOCKED_ICON = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>';
  const UNLOCKED_ICON = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 11V7a4 4 0 018 0m-4 8v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z"/></svg>';

  function updateLockUI() {
    const btn = document.getElementById('balanceLockBtn');
    const input = document.getElementById('balanceInitialInput');
    if (!btn || !input) return;
    const locked = isBalanceLocked();
    btn.innerHTML = locked ? LOCKED_ICON : UNLOCKED_ICON;
    btn.title = locked ? '点击解锁后可修改初始资金' : '点击锁定以禁止修改初始资金';
    input.readOnly = locked;
    if (locked) {
      input.classList.add('opacity-60', 'cursor-not-allowed');
    } else {
      input.classList.remove('opacity-60', 'cursor-not-allowed');
    }
  }

  function toggleBalanceLock() {
    setBalanceLocked(!isBalanceLocked());
    updateLockUI();
    showToast(isBalanceLocked() ? '初始资金已锁定' : '初始资金已解锁');
  }

  function openBalanceModal() {
    const totalPnL = sumPnL(Object.entries(pnlData)
      .filter(([k]) => k !== INITIAL_BALANCE_KEY && k !== BALANCE_LOCKED_KEY)
      .map(([, v]) => v));
    document.getElementById('balanceTotalPnL').textContent = fmtPnL(totalPnL);
    document.getElementById('balanceTotalPnL').className = 'text-sm font-sans font-semibold ' +
      (totalPnL > 0 ? 'text-profit' : totalPnL < 0 ? 'text-loss' : 'text-zinc-400');
    document.getElementById('balanceInitialInput').value = getInitialBalance().toFixed(2);
    document.getElementById('balanceModal').style.display = 'flex';
    updateLockUI();
    setTimeout(() => {
      const input = document.getElementById('balanceInitialInput');
      if (!input.readOnly) { input.focus(); input.setSelectionRange(input.value.length, input.value.length); }
    }, 100);
    updateBalancePreview();
  }

  function closeBalanceModal() {
    document.getElementById('balanceModal').style.display = 'none';
  }

  function updateBalancePreview() {
    const totalPnL = sumPnL(Object.entries(pnlData)
      .filter(([k]) => k !== INITIAL_BALANCE_KEY && k !== BALANCE_LOCKED_KEY)
      .map(([, v]) => v));
    const raw = document.getElementById('balanceInitialInput').value;
    const initial = parseFloat(raw) || 0;
    const balance = initial + totalPnL;
    const el = document.getElementById('balancePreview');
    el.textContent = fmtPnL(balance);
    el.className = 'text-sm font-sans font-semibold ' +
      (balance > 0 ? 'text-profit' : balance < 0 ? 'text-loss' : 'text-zinc-400');
  }

  function saveBalance() {
    if (isBalanceLocked()) { showToast('请先解锁再修改初始资金', 'error'); return; }
    const raw = document.getElementById('balanceInitialInput').value;
    const initial = parseFloat(raw) || 0;
    setInitialBalance(initial);
    closeBalanceModal();
    refreshBalanceDisplay();
    showToast('初始资金已更新');
  }

  // ---- Accounts ----
  function refreshAccountBtn() {
    const label = document.getElementById('accountBtnLabel');
    if (label) label.textContent = currentAccount;
    // Rebuild dropdown menu items
    const menu = document.getElementById('accountMenuItems');
    if (!menu) return;
    const names = Object.keys(allAccounts).sort();
    menu.innerHTML = names.map(n => `
      <div class="flex items-center justify-between px-3.5 py-2 hover:bg-zinc-700 transition-colors cursor-pointer ${n === currentAccount ? 'bg-zinc-700/50' : ''}">
        <span class="text-xs sm:text-sm text-zinc-200 truncate flex-1" onclick="closeAccountMenu(); switchAccount('${n.replace(/'/g, "\\'")}')">${n}</span>
        <button onclick="event.stopPropagation(); closeAccountMenu(); openEditAccountModal('${n.replace(/'/g, "\\'")}')" title="编辑账户名"
          class="ml-1.5 text-zinc-500 hover:text-zinc-300 transition-colors flex-shrink-0 text-sm leading-none">✏️</button>
        <button onclick="event.stopPropagation(); closeAccountMenu(); openDeleteAccountModal('${n.replace(/'/g, "\\'")}')" title="删除账户"
          class="ml-1.5 text-zinc-500 hover:text-loss transition-colors flex-shrink-0 text-sm leading-none">🗑️</button>
      </div>
    `).join('');
  }

  function toggleAccountMenu() {
    const menu = document.getElementById('accountMenu');
    const arrow = document.getElementById('accountArrow');
    const isOpen = !menu.classList.contains('hidden');
    if (isOpen) { closeAccountMenu(); return; }
    refreshAccountBtn();
    menu.classList.remove('hidden');
    arrow.style.transform = 'rotate(180deg)';
  }

  function closeAccountMenu() {
    const menu = document.getElementById('accountMenu');
    const arrow = document.getElementById('accountArrow');
    menu.classList.add('hidden');
    arrow.style.transform = 'rotate(0deg)';
  }

  // Close dropdown when clicking outside
  document.addEventListener('click', function(e) {
    const menu = document.getElementById('accountMenu');
    const btn  = document.getElementById('accountBtn');
    if (menu && btn && !menu.classList.contains('hidden')) {
      if (!btn.contains(e.target) && !menu.contains(e.target)) closeAccountMenu();
    }
  });

  function openNewAccountModal() {
    document.getElementById('newAccountName').value = '';
    const m = document.getElementById('newAccountModal');
    m.style.display = 'flex';
    const card = m.querySelector('.modal-card');
    card.style.animation = 'none'; card.offsetHeight;
    card.style.animation = 'scaleIn 0.2s ease-out';
    setTimeout(() => document.getElementById('newAccountName').focus(), 100);
  }

  function closeNewAccountModal() {
    document.getElementById('newAccountModal').style.display = 'none';
  }

  function confirmNewAccount() {
    const name = document.getElementById('newAccountName').value.trim();
    if (!name) return;
    if (allAccounts[name]) { showToast('账户名已存在', 'error'); return; }
    allAccounts[currentAccount] = pnlData;
    allAccounts[name] = {};
    currentAccount = name;
    pnlData = allAccounts[name];
    saveData();
    closeNewAccountModal();
    refreshAccountBtn();
    renderAll();
    showToast('账户已创建');
  }

  function openDeleteAccountModal(accountName) {
    const names = Object.keys(allAccounts);
    if (names.length <= 1) { showToast('至少保留一个账户', 'error'); return; }
    document.getElementById('deleteAccountMsg').textContent =
      `确定要删除账户「${accountName}」吗？此操作不可撤销，该账户下的所有盈亏数据将被清除。`;
    document.getElementById('deleteAccountTarget').value = accountName;
    const m = document.getElementById('deleteAccountModal');
    m.style.display = 'flex';
    const card = m.querySelector('.modal-card');
    card.style.animation = 'none'; card.offsetHeight;
    card.style.animation = 'scaleIn 0.2s ease-out';
  }

  function closeDeleteAccountModal() {
    document.getElementById('deleteAccountModal').style.display = 'none';
  }

  function confirmDeleteAccount() {
    const target = document.getElementById('deleteAccountTarget').value;
    const names = Object.keys(allAccounts);
    if (names.length <= 1) { closeDeleteAccountModal(); return; }
    delete allAccounts[target];
    if (currentAccount === target) {
      currentAccount = names.find(n => n !== target) || '默认账户';
    }
    pnlData = allAccounts[currentAccount];
    saveData();
    closeDeleteAccountModal();
    refreshAccountBtn();
    renderAll();
    showToast(`已删除「${target}」`);
  }

  function openEditAccountModal(accountName) {
    document.getElementById('editAccountOldName').value = accountName;
    document.getElementById('editAccountName').value = accountName;
    document.getElementById('editAccountError').classList.add('hidden');
    const m = document.getElementById('editAccountModal');
    m.style.display = 'flex';
    const card = m.querySelector('.modal-card');
    card.style.animation = 'none'; card.offsetHeight;
    card.style.animation = 'scaleIn 0.2s ease-out';
    setTimeout(() => {
      const inp = document.getElementById('editAccountName');
      inp.focus();
      const len = inp.value.length;
      inp.setSelectionRange(len, len);
    }, 100);
  }

  function closeEditAccountModal() {
    document.getElementById('editAccountModal').style.display = 'none';
  }

  function confirmEditAccount() {
    const oldName = document.getElementById('editAccountOldName').value;
    const newName = document.getElementById('editAccountName').value.trim();
    const errEl   = document.getElementById('editAccountError');

    if (!newName) { errEl.textContent = '账户名不能为空'; errEl.classList.remove('hidden'); return; }
    if (newName.length > 30) { errEl.textContent = '账户名不能超过 30 个字符'; errEl.classList.remove('hidden'); return; }
    if (newName !== oldName && allAccounts[newName]) { errEl.textContent = '账户名已存在'; errEl.classList.remove('hidden'); return; }

    if (newName !== oldName) {
      allAccounts[newName] = allAccounts[oldName];
      delete allAccounts[oldName];
      if (currentAccount === oldName) currentAccount = newName;
    }
    pnlData = allAccounts[currentAccount];
    saveData();
    closeEditAccountModal();
    refreshAccountBtn();
    renderAll();
    showToast('账户名已更新');
  }

  // ---- Statistics ----
  function getMonthEntries(year, month) {
    const prefix = `${year}-${String(month+1).padStart(2,'0')}-`;
    return Object.entries(pnlData)
      .filter(([k]) => k.startsWith(prefix))
      .map(([k, v]) => ({ date: k, ...v }));
  }

  function getYearEntries(year) {
    const prefix = `${year}-`;
    return Object.entries(pnlData)
      .filter(([k]) => k.startsWith(prefix))
      .map(([k, v]) => ({ date: k, ...v }));
  }

  function sumPnL(entries) {
    return entries.reduce((s, e) => s + e.pnl, 0);
  }

  function calcTradeStats(entries, year, month) {
    const nonZero = entries.filter(e => e.pnl !== 0);
    const wins  = nonZero.filter(e => e.pnl > 0);
    const losses = nonZero.filter(e => e.pnl < 0);
    const totalPnL = sumPnL(nonZero);
    const tradingDays = nonZero.length;
    const winRate = (wins.length + losses.length) > 0
      ? (wins.length / (wins.length + losses.length) * 100) : 0;
    const totalWins = sumPnL(wins);
    const totalLosses = Math.abs(sumPnL(losses));
    const avgWinAmt = wins.length ? totalWins / wins.length : 0;
    const avgLossAmt = losses.length ? totalLosses / losses.length : 0;
    const winLossRatio = losses.length > 0 ? avgWinAmt / avgLossAmt : (wins.length > 0 ? Infinity : 0);
    const profitFactor = totalLosses !== 0 ? totalWins / totalLosses : (totalWins > 0 ? Infinity : 0);
    const best  = nonZero.length ? Math.max(...nonZero.map(e => e.pnl)) : null;
    const worst = nonZero.length ? Math.min(...nonZero.map(e => e.pnl)) : null;

    // Max drawdown from cumulative P&L curve (all days, including zeros)
    const daysInMonth = getDaysInMonth(year, month);
    let peak = 0, running = 0, maxDD = 0;
    for (let d = 1; d <= daysInMonth; d++) {
      const e = getEntry(fmtDate(year, month, d));
      running += e ? e.pnl : 0;
      if (running > peak) peak = running;
      const dd = peak - running;
      if (dd > maxDD) maxDD = dd;
    }
    const recoveryFactor = totalPnL < 0 ? 0 : (maxDD > 0 ? totalPnL / maxDD : (totalPnL > 0 ? Infinity : 0));

    // Expectancy: (winRate * avgWin) - (lossRate * avgLoss)
    const lossRate = (wins.length + losses.length) > 0 ? 100 - winRate : 0;
    const expectancy = tradingDays > 0 ? ((winRate / 100) * avgWinAmt) - ((lossRate / 100) * avgLossAmt) : 0;

    return { tradingDays, winRate, avgWin: avgWinAmt, avgLoss: avgLossAmt, winLossRatio, profitFactor, best, worst, totalPnL, recoveryFactor, maxDD, expectancy, wins: wins.length, losses: losses.length };
  }

  // ---- Rendering ----
  function refreshBalanceDisplay() {
    const balance = getCurrentBalance();
    const el = document.getElementById('currentBalance');
    if (!el) return;
    el.textContent = fmtPnL(balance);
  }

  function renderAll() {
    renderStatsCards();
    renderCalendar();
    renderAdvancedStats();
    drawChart();
    refreshBalanceDisplay();
    document.getElementById('monthLabel').textContent = `${currentYear}年 ${MONTH_NAMES[currentMonth]}`;
  }

  function renderStatsCards() {
    const monthEntries = getMonthEntries(currentYear, currentMonth);
    const yearEntries  = getYearEntries(currentYear);
    const allEntries   = Object.entries(pnlData).filter(([k]) => k !== INITIAL_BALANCE_KEY && k !== BALANCE_LOCKED_KEY).map(([k,v]) => ({ date: k, ...v }));

    const monthPnL = sumPnL(monthEntries);
    const yearPnL  = sumPnL(yearEntries);
    const allPnL   = sumPnL(allEntries);

    const cards = [
      { label: '本月', value: monthPnL },
      { label: `${currentYear}年`, value: yearPnL },
      { label: '全部', value: allPnL },
    ];

    document.getElementById('statsCards').innerHTML = cards.map(c => {
      const cls = c.value > 0 ? 'text-profit' : c.value < 0 ? 'text-loss' : 'text-zinc-400';
      return `
        <div class="bg-zinc-900/80 rounded-xl p-3 sm:p-4 border border-zinc-800/50 text-center">
          <div class="text-xs text-zinc-500 mb-1">${c.label}</div>
          <div class="text-base sm:text-lg font-sans font-semibold ${cls}">${fmtPnL(c.value)}</div>
        </div>`;
    }).join('');
  }

  function renderCalendar() {
    const daysInMonth  = getDaysInMonth(currentYear, currentMonth);
    const startOffset  = getFirstDayOffset(currentYear, currentMonth);
    const totalCells   = Math.ceil((startOffset + daysInMonth) / 7) * 7;
    const todayStr     = fmtDate(now.getFullYear(), now.getMonth(), now.getDate());

    let html = '';
    for (let i = 0; i < totalCells; i++) {
      const dayNum = i - startOffset + 1;

      if (dayNum < 1 || dayNum > daysInMonth) {
        html += '<div class="aspect-square rounded-lg"></div>';
      } else {
        const dateStr = fmtDate(currentYear, currentMonth, dayNum);
        const isWknd  = isWeekend(currentYear, currentMonth, dayNum);
        const isTdy   = dateStr === todayStr;
        const entry   = getEntry(dateStr);

        let cellClass = 'cal-cell aspect-square rounded-lg flex flex-col items-center justify-center cursor-pointer select-none relative ';

        if (isWknd) {
          cellClass += 'bg-zinc-900/30 text-zinc-600 weekend-cell';
        } else if (entry && entry.pnl > 0) {
          cellClass += 'bg-profit/10 hover:bg-profit/20 text-profit border-2 border-profit/20';
        } else if (entry && entry.pnl < 0) {
          cellClass += 'bg-loss/10 hover:bg-loss/20 text-loss border-2 border-loss/20';
        } else {
          cellClass += 'bg-zinc-800/30 hover:bg-zinc-700/40 text-zinc-400 border-2 border-zinc-800/50';
        }

        if (isTdy && !isWknd) {
          cellClass += ' today-ring';
        }

        let pnlHtml = '';
        if (entry && entry.pnl !== 0) {
          pnlHtml = `<span class="text-[15px] sm:text-[17px] font-sans font-medium mt-0.5 truncate max-w-full px-1">${fmtPnL(entry.pnl, true)}</span>`;
        }

        const dotHtml = isTdy ? '<span class="absolute top-1.5 right-1.5 w-1.5 h-1.5 sm:w-2 sm:h-2 bg-amber-400 rounded-full shadow-[0_0_4px_rgba(251,191,36,0.5)]"></span>' : '';

        const onclick = isWknd ? '' : `onclick="openModal('${dateStr}')"`;
        html += `
          <div class="${cellClass}" ${onclick} title="${dateStr}${entry ? ' · ' + fmtPnL(entry.pnl) : ''}${entry?.note ? ' · ' + entry.note : ''}">
            ${dotHtml}
            <span class="text-xs sm:text-sm font-sans font-medium text-zinc-400">${dayNum}</span>
            ${pnlHtml}
          </div>`;
      }

      // End of week row: add weekly P&L summary (current-month days only)
      if ((i + 1) % 7 === 0) {
        const rowStart = i - 6;
        let weekPnL = 0;
        let weekHasPnL = false;
        for (let c = 0; c < 7; c++) {
          const d = (rowStart + c) - startOffset + 1;
          if (d >= 1 && d <= daysInMonth) {
            const e = getEntry(fmtDate(currentYear, currentMonth, d));
            if (e && e.pnl !== 0) { weekPnL += e.pnl; weekHasPnL = true; }
          }
        }

        let sumClass = 'flex flex-col items-center justify-center rounded-lg ';
        let sumText  = '';
        if (weekHasPnL && weekPnL > 0) {
          sumClass += 'bg-profit/5 border-2 border-profit/15 text-profit';
          sumText = fmtPnL(weekPnL, true);
        } else if (weekHasPnL && weekPnL < 0) {
          sumClass += 'bg-loss/5 border-2 border-loss/15 text-loss';
          sumText = fmtPnL(weekPnL, true);
        } else {
          sumClass += 'bg-zinc-800/10 border-2 border-zinc-800/30 text-zinc-600';
          sumText = weekHasPnL ? '$0.00' : '';
        }

        html += `<div class="${sumClass}">
          <span class="text-xs sm:text-sm text-zinc-600 mb-0.5">W${Math.floor(i / 7) + 1}</span>
          <span class="text-[15px] sm:text-[17px] font-sans font-medium">${sumText}</span>
        </div>`;
      }
    }

    document.getElementById('calendarGrid').innerHTML = html;
  }

    const hasData = stats.tradingDays > 0;

      { label: `恢复因子${tip('恢复因子 = 当月总净收益 / 最大回撤（绝对值）。净收益为负时显示 0。')}`,
        value: hasData ? (stats.recoveryFactor === Infinity ? '∞' : stats.recoveryFactor.toFixed(2)) : '--', unit: '', color: hasData ? (stats.recoveryFactor >= 1 ? 'text-profit' : 'text-loss') : 'text-zinc-500', rawLabel: '恢复因子' },

        value: hasData ? fmtPnL(stats.expectancy, true) : '--', unit: '', color: hasData ? (stats.expectancy > 0 ? 'text-profit' : stats.expectancy < 0 ? 'text-loss' : 'text-zinc-400') : 'text-zinc-500', rawLabel: '每日期望' },
      { label: '最大回撤', value: hasData ? fmtPnL(-Math.abs(stats.maxDD), true) : '--', unit: '', color: hasData ? 'text-loss' : 'text-zinc-500', tip: '' },
      { label: '平均盈/亏',
        value: hasData ? `${fmtPnL(stats.avgWin, true)} / ${fmtPnL(-stats.avgLoss, true)}` : '--', unit: '', color: hasData ? 'text-profit' : 'text-zinc-500', tip: '' },

    document.getElementById('advancedStats').innerHTML = items.map(i => `
      <div class="bg-zinc-800/50 rounded-xl p-3 border border-zinc-800/50">

        <div class="text-sm sm:text-base font-sans font-semibold ${i.color}">${i.value}<span class="text-xs text-zinc-500 ml-0.5">${i.unit}</span></div>

  // ---- Chart (Canvas) ----
  function drawChart() {
    const canvas   = document.getElementById('pnlChart');
    const container = canvas.parentElement;
    const tooltip  = document.getElementById('chartTooltip');
    const dpr      = window.devicePixelRatio || 1;
    const W        = container.clientWidth * dpr;
    const H        = 240 * dpr;
    canvas.width  = W;
    canvas.height = H;
    canvas.style.width  = container.clientWidth + 'px';
    canvas.style.height = '240px';

    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, W, H);

    // Theme-aware colors
    const isLight = getTheme() === 'light';
    const TC = {
      grid: isLight ? 'rgba(148,163,184,0.12)' : 'rgba(255,255,255,0.04)',
      zeroLine: isLight ? 'rgba(100,116,139,0.5)' : 'rgba(255,255,255,0.15)',
      label: isLight ? 'rgba(71,85,105,0.7)' : 'rgba(255,255,255,0.30)',
      green: '#A2E736',
      red: '#F543A5',
      greenFill: 'rgba(162,231,54,0.10)',
      redFill: 'rgba(245,67,165,0.10)',
      hoverLine: isLight ? 'rgba(0,0,0,0.12)' : 'rgba(255,255,255,0.10)',
      gray: '#888888',
    };

    // ---- Data ----
    const daysInMonth = getDaysInMonth(currentYear, currentMonth);
    // Find the last day in this month that has a P&L record
    const prefix = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-`;
    let lastDataDay = 0;
    for (let d = daysInMonth; d >= 1; d--) {
      const ds = prefix + String(d).padStart(2,'0');
      if (pnlData[ds]) { lastDataDay = d; break; }
    }

    // No data at all this month: show placeholder
    if (lastDataDay === 0) {
      ctx.fillStyle = TC.label;
      ctx.font = `${13*dpr}px system-ui`;
      ctx.textAlign = 'center';
      ctx.fillText('本月无数据', W / 2, H / 2);
      return;
    }

    const points = [];   // { day, value }
    let running = 0, maxAbs = 0;
    for (let d = 1; d <= lastDataDay; d++) {
      const e = getEntry(fmtDate(currentYear, currentMonth, d));
      running += e ? e.pnl : 0;
      const v = Math.round(running * 100) / 100;
      points.push({ day: d, value: v });
      if (Math.abs(v) > maxAbs) maxAbs = Math.abs(v);
    }
    if (maxAbs === 0) maxAbs = 1;
    // Prepend virtual origin so the curve starts from 0 at the left edge
    points.unshift({ day: 0, value: 0, _virtual: true });

    // ---- Layout ----
    const PAD = { top: 16*dpr, right: 8*dpr, bottom: 28*dpr, left: 52*dpr };
    const plotW = W - PAD.left - PAD.right;
    const plotH = H - PAD.top - PAD.bottom;
    const yRange = maxAbs * 1.2 || 10;
    const xS = (day) => PAD.left + (day / lastDataDay) * plotW;
    const yS = (val) => PAD.top + plotH / 2 - (val / yRange) * (plotH / 2);
    const y0  = yS(0);

    // ---- Grid (dashed) ----
    ctx.save();
    ctx.strokeStyle = TC.grid;
    ctx.lineWidth   = 0.5 * dpr;
    ctx.setLineDash([5*dpr, 5*dpr]);
    const gridLines = 5;
    for (let i = 0; i <= gridLines; i++) {
      const y = PAD.top + (plotH / gridLines) * i;
      ctx.beginPath();
      ctx.moveTo(PAD.left, y);
      ctx.lineTo(W - PAD.right, y);
      ctx.stroke();
    }
    ctx.setLineDash([]);
    ctx.restore();
    // Zero line
    ctx.strokeStyle = TC.zeroLine;
    ctx.lineWidth   = 1 * dpr;
    ctx.beginPath();
    ctx.moveTo(PAD.left, y0);
    ctx.lineTo(W - PAD.right, y0);
    ctx.stroke();

    // Y-axis labels (left side)
    ctx.fillStyle = TC.label;
    ctx.font      = `${10*dpr}px Space Grotesk, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif`;
    ctx.textAlign = 'right';
    for (let i = 0; i <= gridLines; i++) {
      const val = yRange * (1 - i / gridLines) - yRange / 2;
      const y = PAD.top + (plotH / gridLines) * i;
      const abv = Math.abs(val);
      const lbl = (val >= 0 ? '$' : '-$') + (abv >= 1000 ? (abv/1000).toFixed(1)+'k' : abv.toFixed(0));
      if (Math.abs(val) < yRange * 0.02) continue; // skip near-zero label (handled by zero line)
      ctx.fillText(lbl, PAD.left - 6*dpr, y + 3.5*dpr);
    }

    // X-axis labels (every ~7 days, up to lastDataDay)
    ctx.textAlign = 'center';
    ctx.fillStyle = TC.label;
    ctx.font      = `${9*dpr}px Space Grotesk, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif`;
    const step = Math.max(1, Math.round(lastDataDay / 10));
    for (let d = 1; d <= lastDataDay; d += step) {
      ctx.fillText(d, xS(d), H - PAD.bottom + 14*dpr);
    }

    // ---- Smooth curve helper (Catmull-Rom → sampled points) ----
    function getCurvePoints(pts, samplesPerSegment) {
      const result = [];
      if (pts.length < 2) return result;
      const n = pts.length;
      for (let i = 0; i < n - 1; i++) {
        const p0 = pts[Math.max(0, i - 1)];
        const p1 = pts[i];
        const p2 = pts[i + 1];
        const p3 = pts[Math.min(n - 1, i + 2)];
        // Catmull-Rom tangents (tension 0)
        const cp1x = p1.x + (p2.x - p0.x) / 6;
        const cp1y = p1.y + (p2.y - p0.y) / 6;
        const cp2x = p2.x - (p3.x - p1.x) / 6;
        const cp2y = p2.y - (p3.y - p1.y) / 6;
        for (let s = 0; s < samplesPerSegment; s++) {
          const t = s / samplesPerSegment;
          const u = 1 - t;
          const x = u*u*u * p1.x + 3*u*u*t * cp1x + 3*u*t*t * cp2x + t*t*t * p2.x;
          const y = u*u*u * p1.y + 3*u*u*t * cp1y + 3*u*t*t * cp2y + t*t*t * p2.y;
          result.push({ x, y });
        }
      }
      result.push({ x: pts[n-1].x, y: pts[n-1].y });
      return result;
    }

    // Build screen-space points for the curve
    const rawCurvePts = points.map(p => ({ x: xS(p.day), y: yS(p.value) }));
    const curvePts = getCurvePoints(rawCurvePts, 16);

    // ---- Fill areas ----
    function fillSegment(x0, y0v, x1, y1v, color, yBase) {
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(x0, yS(y0v));
      ctx.lineTo(x1, yS(y1v));
      ctx.lineTo(x1, yBase);
      ctx.lineTo(x0, yBase);
      ctx.closePath();
      ctx.fill();
    }

    for (let i = 0; i < points.length - 1; i++) {
      const p0 = points[i], p1 = points[i + 1];
      const x0_ = xS(p0.day), x1_ = xS(p1.day);
      const v0 = p0.value, v1 = p1.value;

      if (v0 >= 0 && v1 >= 0) {
        fillSegment(x0_, v0, x1_, v1, TC.greenFill, y0);
      } else if (v0 <= 0 && v1 <= 0) {
        fillSegment(x0_, v0, x1_, v1, TC.redFill, y0);
      } else {
        const t = v0 / (v0 - v1);
        const cx = x0_ + t * (x1_ - x0_);
        if (v0 > 0) {
          fillSegment(x0_, v0, cx, 0, TC.greenFill, y0);
          fillSegment(cx, 0, x1_, v1, TC.redFill, y0);
        } else {
          fillSegment(x0_, v0, cx, 0, TC.redFill, y0);
          fillSegment(cx, 0, x1_, v1, TC.greenFill, y0);
        }
      }
    }

    // ---- Smooth curve line (with neon glow) ----
    ctx.save();
    ctx.lineWidth = 2 * dpr;
    for (let i = 0; i < curvePts.length - 1; i++) {
      const p0 = curvePts[i], p1 = curvePts[i + 1];
      const y0v = p0.y, y1v = p1.y;

      // Determine segment color based on Y position relative to y0
      const midY = (y0v + y1v) / 2;
      const c = midY < y0 ? TC.green : midY > y0 ? TC.red : TC.gray;

      ctx.strokeStyle = c;
      ctx.shadowColor = c;
      ctx.shadowBlur = 6 * dpr;
      ctx.beginPath();
      ctx.moveTo(p0.x, p0.y);
      ctx.lineTo(p1.x, p1.y);
      ctx.stroke();
      // sharpen core
      ctx.shadowBlur = 0;
      ctx.beginPath();
      ctx.moveTo(p0.x, p0.y);
      ctx.lineTo(p1.x, p1.y);
      ctx.stroke();
    }
    ctx.restore();

    // ---- Hover: show dot + tooltip on interaction ----
    canvas.onmousemove = function(e) {
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;

      // Find nearest real data point
      let best = null, bestDist = Infinity;
      for (const p of points) {
        if (p._virtual) continue;
        const dx = xS(p.day) / dpr - mx;
        const dy = yS(p.value) / dpr - my;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < bestDist && dist < 30) { best = p; bestDist = dist; }
      }

      if (best) {
        const tx = xS(best.day) / dpr;
        const ty = yS(best.value) / dpr;
        tooltip.style.left = tx + 'px';
        tooltip.style.top  = ty + 'px';
        const colorHex = best.value > 0 ? '#A2E736' : best.value < 0 ? '#F543A5' : '#a0a0a0';
        tooltip.innerHTML = `${currentYear}年${MONTH_NAMES[currentMonth]}${best.day}日<br><span style="color:${colorHex}">${fmtPnL(best.value)}</span>`;
        tooltip.classList.remove('hidden');

        // Redraw chart clean, then overlay guide + highlighted dot
        drawChart();
        const cctx = canvas.getContext('2d');

        // Vertical guide line (dashed)
        cctx.strokeStyle = TC.hoverLine;
        cctx.lineWidth   = 1 * dpr;
        cctx.setLineDash([4*dpr, 4*dpr]);
        cctx.beginPath();
        cctx.moveTo(xS(best.day), PAD.top);
        cctx.lineTo(xS(best.day), H - PAD.bottom);
        cctx.stroke();
        cctx.setLineDash([]);

        // Glow dot
        const dotColor = best.value > 0 ? TC.green : best.value < 0 ? TC.red : TC.gray;
        cctx.shadowColor = dotColor;
        cctx.shadowBlur = 8 * dpr;
        cctx.fillStyle = dotColor;
        cctx.beginPath();
        cctx.arc(xS(best.day), yS(best.value), 4 * dpr, 0, Math.PI * 2);
        cctx.fill();
        // Sharp inner dot
        cctx.shadowBlur = 0;
        cctx.fillStyle = dotColor;
        cctx.beginPath();
        cctx.arc(xS(best.day), yS(best.value), 2.5 * dpr, 0, Math.PI * 2);
        cctx.fill();
        // Center punch (bg color)
        cctx.fillStyle = getTheme() === 'light' ? '#ffffff' : '#141414';
        cctx.beginPath();
        cctx.arc(xS(best.day), yS(best.value), 1.2 * dpr, 0, Math.PI * 2);
        cctx.fill();
      } else {
        tooltip.classList.add('hidden');
      }
    };

    canvas.onmouseleave = function() {
      tooltip.classList.add('hidden');
    };
  }

  // ---- Modal ----
  function openModal(dateStr) {
    const { y, m, d } = parseDate(dateStr);
    const entry = getEntry(dateStr);
    const dayName = DAY_NAMES[new Date(y, m, d).getDay()];

    document.getElementById('modalDate').textContent = `${y}年${MONTH_NAMES[m]}${d}日 ${dayName}`;
    document.getElementById('modalPnl').value = entry ? entry.pnl.toFixed(2) : '';
    document.getElementById('modalNote').value = entry ? entry.note : '';
    document.getElementById('modalDelete').style.display = entry ? '' : 'none';
    document.getElementById('modal').style.display = 'flex';

    // Re-trigger animation
    const card = document.querySelector('.modal-card');
    card.style.animation = 'none';
    card.offsetHeight; // force reflow
    card.style.animation = 'scaleIn 0.2s ease-out';

    setTimeout(() => {
      const inp = document.getElementById('modalPnl');
      inp.focus();
      const len = inp.value.length;
      inp.setSelectionRange(len, len);
    }, 100);
  }

  function filterPnlInput(el) {
    let v = el.value;
    // Remove any character that isn't digit, minus, or dot
    v = v.replace(/[^0-9.\-]/g, '');
    // Keep minus only at the very beginning
    if (v.indexOf('-') > 0) v = v.replace(/-/g, '');
    // Keep only the first dot
    const firstDot = v.indexOf('.');
    if (firstDot !== -1) {
      v = v.substring(0, firstDot + 1) + v.substring(firstDot + 1).replace(/\./g, '');
    }
    el.value = v;
  }

  function closeModal() {
    document.getElementById('modal').style.display = 'none';
  }

  function saveModalEntry() {
    const dateStr = parseModalDate();
    const pnlStr = document.getElementById('modalPnl').value.trim();
    const note   = document.getElementById('modalNote').value;

    if (pnlStr === '' || isNaN(parseFloat(pnlStr))) {
      // Empty or invalid: delete if exists
      if (getEntry(dateStr)) {
        deleteEntry(dateStr);
      }
    } else {
      setEntry(dateStr, parseFloat(pnlStr), note);
    }

    closeModal();
    renderAll();
  }

  function deleteModalEntry() {
    const dateStr = parseModalDate();
    deleteEntry(dateStr);
    closeModal();
    renderAll();
    showToast('已删除');
  }

  function parseModalDate() {
    const text = document.getElementById('modalDate').textContent;
    const match = text.match(/(\d{4})年(\d{1,2})月(\d{1,2})日/);
    return fmtDate(parseInt(match[1]), parseInt(match[2])-1, parseInt(match[3]));
  }

  // ---- Import / Export ----
  function exportData() {
    const exportData = {};
    for (const [k, v] of Object.entries(pnlData)) {
      if (k !== INITIAL_BALANCE_KEY && k !== BALANCE_LOCKED_KEY) exportData[k] = v;
    }
    const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `pnl-${currentAccount}-${fmtDate(currentYear, currentMonth, 1)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('导出成功');
  }

  function importData(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const imported = JSON.parse(e.target.result);
        if (typeof imported !== 'object' || Array.isArray(imported)) throw new Error('Invalid format');
        for (const [key, val] of Object.entries(imported)) {
          if (!/^\d{4}-\d{2}-\d{2}$/.test(key)) throw new Error(`Invalid date key: ${key}`);
          if (typeof val.pnl !== 'number') throw new Error(`Invalid pnl for ${key}`);
        }
        const count = Object.keys(imported).length;
        Object.assign(pnlData, imported);
        saveData();
        renderAll();
        showToast(`已导入 ${count} 条记录`);
      } catch (err) {
        showToast('导入失败：文件格式不正确', 'error');
        console.error(err);
      }
    };
    reader.readAsText(file);
    event.target.value = '';
  }

  // ---- Toast ----
  // ---- Stat Tooltip ----
  let statTipTimer;

  function showStatTip(e, el) {
    const tooltip = document.getElementById('statTooltip');
    const text = el.getAttribute('data-tip');
    if (!text) return;
    tooltip.textContent = text;
    tooltip.classList.remove('hidden');
    clearTimeout(statTipTimer);
    statTipTimer = setTimeout(() => {
      const r = tooltip.getBoundingClientRect();
      const x = e.clientX + 12;
      const y = e.clientY - 12;
      tooltip.style.left = (x + r.width > window.innerWidth - 8 ? x - r.width - 24 : x) + 'px';
      tooltip.style.top  = (y - r.height < 8 ? y + r.height + 24 : y - r.height) + 'px';
      tooltip.style.opacity = '1';
    }, 300);
  }

  function hideStatTip() {
    clearTimeout(statTipTimer);
    const tooltip = document.getElementById('statTooltip');
    tooltip.style.opacity = '0';
    tooltip.classList.add('hidden');
  }

  let toastTimer;
  function showToast(msg, type) {
    const el = document.getElementById('toast');
    const bg = type === 'error' ? 'bg-loss' : 'bg-zinc-700';
    el.innerHTML = `<div class="toast-enter ${bg} text-zinc-100 text-sm px-4 py-2 rounded-xl shadow-lg border border-[#555]/50 whitespace-nowrap">${msg}</div>`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.innerHTML = ''; }, 2200);
  }

  // ---- Navigation ----
  function goToPrevMonth() {
    if (currentMonth === 0) { currentMonth = 11; currentYear--; }
    else { currentMonth--; }
    renderAll();
  }

  function goToNextMonth() {
    if (currentMonth === 11) { currentMonth = 0; currentYear++; }
    else { currentMonth++; }
    renderAll();
  }

  function goToToday() {
    currentYear  = now.getFullYear();
    currentMonth = now.getMonth();
    renderAll();
  }

  function clearCurrentMonth() {
    const label = `${currentYear}年${MONTH_NAMES[currentMonth]}`;
    document.getElementById('confirmClearMsg').textContent =
      `确定要清空 ${label} 的所有盈亏记录吗？此操作不可撤销。`;
    const m = document.getElementById('confirmClearModal');
    m.style.display = 'flex';
    const card = m.querySelector('.modal-card');
    card.style.animation = 'none';
    card.offsetHeight;
    card.style.animation = 'scaleIn 0.2s ease-out';
  }

  function closeConfirmClear() {
    document.getElementById('confirmClearModal').style.display = 'none';
  }

  function doClearMonth() {
    const prefix = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-`;
    for (const key of Object.keys(pnlData)) {
      if (key.startsWith(prefix)) delete pnlData[key];
    }
    saveData();
    closeConfirmClear();
    renderAll();
    showToast('已清空');
  }

  // ---- Keyboard ----
  document.addEventListener('keydown', function(e) {
    const modal = document.getElementById('modal');
    const confirmModal = document.getElementById('confirmClearModal');
    const newAccModal = document.getElementById('newAccountModal');
    const delAccModal = document.getElementById('deleteAccountModal');
    const editAccModal = document.getElementById('editAccountModal');
    const balanceModal = document.getElementById('balanceModal');
    const anyModalOpen = (m) => m && m.style.display === 'flex';

    if (anyModalOpen(delAccModal)) {
      if (e.key === 'Escape') { closeDeleteAccountModal(); return; }
    }
    if (anyModalOpen(editAccModal)) {
      if (e.key === 'Escape') { closeEditAccountModal(); return; }
      if (e.key === 'Enter') { confirmEditAccount(); return; }
    }
    if (anyModalOpen(newAccModal)) {
      if (e.key === 'Escape') { closeNewAccountModal(); return; }
      if (e.key === 'Enter') { confirmNewAccount(); return; }
    }
    if (anyModalOpen(confirmModal)) {
      if (e.key === 'Escape') { closeConfirmClear(); return; }
    }
    if (anyModalOpen(balanceModal)) {
      if (e.key === 'Escape') { closeBalanceModal(); return; }
      if (e.key === 'Enter') { saveBalance(); return; }
    }
    if (anyModalOpen(modal)) {
      if (e.key === 'Escape') { closeModal(); }
      if (e.key === 'Enter' && document.activeElement?.tagName !== 'TEXTAREA') { saveModalEntry(); }
    }
    if (!anyModalOpen(modal) && !anyModalOpen(confirmModal) && !anyModalOpen(newAccModal) && !anyModalOpen(delAccModal) && !anyModalOpen(editAccModal) && !anyModalOpen(balanceModal)) {
      if (e.key === 'ArrowLeft')  { goToPrevMonth(); }
      if (e.key === 'ArrowRight') { goToNextMonth(); }
    }
  });

  // ---- Resize ----
  let resizeDebounce;
  window.addEventListener('resize', () => {
    clearTimeout(resizeDebounce);
    resizeDebounce = setTimeout(drawChart, 200);
  });

  // ---- Theme ----
  function getTheme() {
    return document.documentElement.classList.contains('light-theme') ? 'light' : 'dark';
  }

  function applyTheme(theme) {
    const html = document.documentElement;
    const icon = document.getElementById('themeIcon');
    if (theme === 'light') {
      html.classList.add('light-theme');
      if (icon) icon.textContent = '☀️';
    } else {
      html.classList.remove('light-theme');
      if (icon) icon.textContent = '🌙';
    }
  }

  function toggleTheme() {
    const next = getTheme() === 'dark' ? 'light' : 'dark';
    localStorage.setItem('themePreference', next);
    applyTheme(next);
    drawChart(); // redraw chart with new theme colors
  }

  function initTheme() {
    const saved = localStorage.getItem('themePreference');
    applyTheme(saved === 'light' ? 'light' : 'dark');
  }

  // ---- Init ----
  function init() {
    initTheme();
    loadData();
    refreshAccountBtn();
    renderAll();
  }

  init();
  </script>
</body>
</html>
